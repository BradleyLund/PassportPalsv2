name: Update visa data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download latest dataset
        run: |
          curl -fsSL -o passport-index-tidy-iso3.csv \
            "https://raw.githubusercontent.com/imorte/passport-index-data/main/passport-index-tidy-iso3.csv"

      - name: Sanity-check the download
        run: |
          head -1 passport-index-tidy-iso3.csv | grep -q "^Passport,Destination,Requirement$"
          test "$(wc -l < passport-index-tidy-iso3.csv)" -gt 30000

      - name: Commit and push if the data changed
        run: |
          if git diff --quiet passport-index-tidy-iso3.csv; then
            echo "Data is already up to date."
            exit 0
          fi
          printf '{\n  "source": "https://github.com/imorte/passport-index-data",\n  "lastUpdated": "%s"\n}\n' \
            "$(date -u +%Y-%m-%d)" > data-meta.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add passport-index-tidy-iso3.csv data-meta.json
          git commit -m "Update visa data from imorte/passport-index-data"
          git push
